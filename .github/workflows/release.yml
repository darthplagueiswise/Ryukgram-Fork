name: Build RyukGram Rootless Test

on:
    push:
        branches:
            - 'test'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build RyukGram rootless
        runs-on: macos-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                submodules: recursive
                fetch-depth: 0

            - name: Install Dependencies
              run: brew install ldid dpkg make

            - name: Set PATH
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                ref: master
                path: ${{ github.workspace }}/theos
                submodules: recursive

            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Set test package version
              id: version
              run: |
                BASE_VERSION=$(awk '/Version:/ {print $2}' control)
                BUILD_VERSION="${BASE_VERSION}.0.0.${GITHUB_RUN_NUMBER}"
                sed -i '' "s/^Version:.*/Version: ${BUILD_VERSION}/" control
                echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
                echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
                echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
                echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
                echo "Using package version ${BUILD_VERSION}"
                grep '^Version:' control

            - name: Setup FFmpegKit
              run: ./scripts/setup-ffmpegkit.sh

            - name: Build rootless deb
              run: |
                export THEOS="${{ github.workspace }}/theos"
                ./build.sh rootless
                cd packages
                DEB="$(ls -t *-rootless.deb | head -n1)"
                [ -n "$DEB" ] && mv "$DEB" "RyukGram_${BUILD_VERSION}_rootless.deb"
                ls -la

            - name: Upload rootless artifact
              uses: actions/upload-artifact@v4
              with:
                name: RyukGram_v${{ steps.version.outputs.build_version }}_rootless
                path: packages/RyukGram_${{ env.BUILD_VERSION }}_rootless.deb
                if-no-files-found: error
