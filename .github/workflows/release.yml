name: Build and Release RyukGram Vanilla

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build RyukGram
        runs-on: macos-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                submodules: recursive
                fetch-depth: 0

            - name: Install Dependencies
              run: brew install ldid dpkg make gh

            - name: Set PATH
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                ref: master
                path: ${{ github.workspace }}/theos
                submodules: recursive

            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Set vanilla package version
              id: version
              run: |
                RAW_VERSION=$(awk '/Version:/ {print $2}' control)
                BASE_VERSION=$(printf '%s\n' "$RAW_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
                BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
                RUN_NUMBER="${GITHUB_RUN_NUMBER}"
                BUILD_VERSION="${BASE_VERSION}.${RUN_NUMBER}"
                BUILD_LABEL="${BRANCH_NAME}_${BUILD_VERSION}"
                PACKAGE_NAME="RyukGram_${BRANCH_NAME}_${BUILD_VERSION}.deb"
                sed -i '' "s/^Version:.*/Version: ${BUILD_VERSION}/" control
                echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
                echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
                echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
                echo "RUN_NUMBER=${RUN_NUMBER}" >> "$GITHUB_ENV"
                echo "BUILD_LABEL=${BUILD_LABEL}" >> "$GITHUB_ENV"
                echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"
                echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
                echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
                echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
                echo "run_number=${RUN_NUMBER}" >> "$GITHUB_OUTPUT"
                echo "build_label=${BUILD_LABEL}" >> "$GITHUB_OUTPUT"
                echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
                echo "Using package version ${BUILD_VERSION} (${BUILD_LABEL})"
                grep '^Version:' control

            - name: Setup FFmpegKit
              run: ./scripts/setup-ffmpegkit.sh

            - name: Build package
              run: |
                export THEOS="${{ github.workspace }}/theos"
                ./build.sh rootless
                cd packages
                DEB="$(ls -t *.deb | head -n1)"
                [ -n "$DEB" ] && mv "$DEB" "$PACKAGE_NAME"
                ls -la

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: RyukGram_${{ steps.version.outputs.branch_name }}_v${{ steps.version.outputs.build_version }}
                path: packages/${{ steps.version.outputs.package_name }}
                if-no-files-found: error

            - name: Check if release
              id: check_release
              run: |
                COMMIT_MSG=$(git log -1 --pretty=%B)
                if [[ "$COMMIT_MSG" == *"[release]"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                  echo "should_release=true" >> "$GITHUB_OUTPUT"
                else
                  echo "should_release=false" >> "$GITHUB_OUTPUT"
                fi

            - name: Generate release notes
              if: steps.check_release.outputs.should_release == 'true'
              run: |
                PREV_TAG=$(git tag --sort=-creatordate | grep -v "v${BUILD_VERSION}$" | head -n1 || true)
                {
                  echo "## Changelog"
                  echo ""
                  git log -1 --pretty=%B | tail -n +2 | sed -e '/^<!--/,/-->$/d' -e '/^\[release\]/d'
                  echo ""
                  echo "## Downloads"
                  echo ""
                  echo "| File | Description |"
                  echo "|------|-------------|"
                  echo "| \`${PACKAGE_NAME}\` | ${BRANCH_NAME} .deb package. |"
                  echo ""
                  if [ -n "$PREV_TAG" ]; then
                    echo "**Full changelog:** [\`${PREV_TAG}\`...\`v${BUILD_VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${BUILD_VERSION})"
                  else
                    echo "**[All commits](https://github.com/${{ github.repository }}/commits/${BRANCH_NAME})**"
                  fi
                } > /tmp/release_notes.md

            - name: Create Release
              if: steps.check_release.outputs.should_release == 'true'
              run: |
                SUBJECT=$(git log -1 --pretty=%s | sed 's/\[release\]//g' | xargs)
                TITLE="${SUBJECT:-RyukGram ${BRANCH_NAME} v${BUILD_VERSION}}"
                gh release create "v${BUILD_VERSION}" \
                  --repo "${{ github.repository }}" \
                  --title "$TITLE" \
                  --notes-file /tmp/release_notes.md \
                  "packages/${PACKAGE_NAME}"
              env:
                GH_TOKEN: ${{ github.token }}
