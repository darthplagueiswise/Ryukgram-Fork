name: Build and Release RyukGram

on:
    push:
        branches:
            - 'main'
            - 'codex/create-configurations-for-employee-and-internal-toggles'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build RyukGram rootless
        runs-on: macos-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                submodules: recursive
                fetch-depth: 0

            - name: Install Dependencies
              run: brew install ldid dpkg make

            - name: Set PATH
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                ref: master
                path: ${{ github.workspace }}/theos
                submodules: recursive

            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Get Version
              id: version
              run: |
                BASE_VERSION=$(awk '/Version:/ {print $2}' control)
                BUILD_VERSION="${BASE_VERSION}.0.0.${GITHUB_RUN_NUMBER}"
                python3 - <<PY
from pathlib import Path
p = Path('control')
text = p.read_text()
lines = []
for line in text.splitlines():
    if line.startswith('Version:'):
        lines.append('Version: ${BUILD_VERSION}')
    else:
        lines.append(line)
p.write_text('\n'.join(lines) + '\n')
PY
                echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
                echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
                echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
                echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
                echo "Using package version ${BUILD_VERSION}"
                grep '^Version:' control

            - name: Setup FFmpegKit
              run: ./scripts/setup-ffmpegkit.sh

            - name: Build rootless deb
              run: |
                export THEOS="${{ github.workspace }}/theos"
                ./build.sh rootless
                cd packages
                DEB="$(ls -t *-rootless.deb | head -n1)"
                [ -n "$DEB" ] && mv "$DEB" "RyukGram_${BUILD_VERSION}_rootless.deb"
                ls -la

            - name: Upload rootless artifact
              uses: actions/upload-artifact@v4
              with:
                name: RyukGram_v${{ steps.version.outputs.build_version }}_rootless
                path: packages/RyukGram_${{ env.BUILD_VERSION }}_rootless.deb
                if-no-files-found: error

            - name: Check if release
              id: check_release
              run: |
                COMMIT_MSG=$(git log -1 --pretty=%B)
                if [[ "${GITHUB_REF_NAME}" == "codex/create-configurations-for-employee-and-internal-toggles" ]] || [[ "$COMMIT_MSG" == *"[release]"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                  echo "should_release=true" >> "$GITHUB_OUTPUT"
                else
                  echo "should_release=false" >> "$GITHUB_OUTPUT"
                fi

            - name: Generate release notes
              if: steps.check_release.outputs.should_release == 'true'
              run: |
                if [[ "${GITHUB_REF_NAME}" == "codex/create-configurations-for-employee-and-internal-toggles" ]]; then
                  PREV_TAG=$(git tag --sort=-creatordate | grep '^codex-v' | head -n1 || true)
                  RELEASE_LABEL="Codex test build"
                else
                  PREV_TAG=$(git tag --sort=-creatordate | grep -v "v${BUILD_VERSION}$" | head -n1 || true)
                  RELEASE_LABEL="Release build"
                fi
                {
                  echo "## ${RELEASE_LABEL} ${BUILD_VERSION}"
                  echo ""
                  echo "Commit: \`${GITHUB_SHA}\`"
                  echo "Branch: \`${GITHUB_REF_NAME}\`"
                  echo ""
                  echo "## Changelog"
                  echo ""
                  git log -1 --pretty=%B | sed -e '/^<!--/,/-->$/d' -e '/^\[release\]/d'
                  echo ""
                  echo "## Downloads"
                  echo ""
                  echo "| File | Description |"
                  echo "|------|-------------|"
                  echo "| \`RyukGram_${BUILD_VERSION}_rootless.deb\` | Rootless .deb. Direct download from Releases, not zipped. |"
                  echo ""
                  if [ -n "$PREV_TAG" ]; then
                    echo "**Full changelog:** [\`${PREV_TAG}\`...\`${GITHUB_SHA}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_SHA})"
                  else
                    echo "**[All commits](https://github.com/${{ github.repository }}/commits/${GITHUB_REF_NAME})**"
                  fi
                } > /tmp/release_notes.md

            - name: Create Release
              if: steps.check_release.outputs.should_release == 'true'
              run: |
                if [[ "${GITHUB_REF_NAME}" == "codex/create-configurations-for-employee-and-internal-toggles" ]]; then
                  TAG="codex-v${BUILD_VERSION}"
                  TITLE="Codex RyukGram ${BUILD_VERSION}"
                  PRERELEASE="--prerelease"
                else
                  TAG="v${BUILD_VERSION}"
                  SUBJECT=$(git log -1 --pretty=%s | sed 's/\[release\]//g' | xargs)
                  TITLE="${SUBJECT:-RyukGram v${BUILD_VERSION}}"
                  PRERELEASE=""
                fi

                if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                  gh release upload "$TAG" \
                    --repo "${{ github.repository }}" \
                    --clobber \
                    "packages/RyukGram_${BUILD_VERSION}_rootless.deb"
                else
                  gh release create "$TAG" \
                    --repo "${{ github.repository }}" \
                    --title "$TITLE" \
                    --notes-file /tmp/release_notes.md \
                    $PRERELEASE \
                    "packages/RyukGram_${BUILD_VERSION}_rootless.deb"
                fi
              env:
                GH_TOKEN: ${{ github.token }}
